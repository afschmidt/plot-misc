# To contribute improvements to CI/CD templates, please follow the Development guide at:
# https://docs.gitlab.com/ee/development/cicd/templates.html
# This specific template is located at:
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Python.gitlab-ci.yml

# Official language image. Look for the different tagged releases at:
# https://hub.docker.com/r/library/python/tags/
image:
    name: floriaan1/plot-misc:master 
    entrypoint: ["/bin/sh", "-c"]
    # entrypoint: [ '/bin/bash', '-c', 'ln -snf /bin/bash /bin/sh && /bin/bash -c $0' ]
# Change pip's cache directory to be inside the project directory since we can
# only cache local items.
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
# Pip's cache doesn't store the python packages
# https://pip.pypa.io/en/stable/topics/caching/
#
# If you want to also cache the installed packages, you have to install
# them in a virtualenv and cache it as well.
cache:
  paths:
    - .cache/pip

# Only run pipelines for merge requests and the default branch. This gives test
# feedback on MRs while avoiding duplicate branch+MR pipelines.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - test
  - deploy


# Unit tests on stock slim images (fast binary wheels), across all supported
# Python versions via a matrix. Runs on every MR and on the default branch,
# independently of the docs deploy. Blocks on failure. GitLab matrix legs are
# independent jobs, so every version runs even if one fails. Each version keeps
# its own pip cache so wheel downloads are reused across runs.
unit-tests:
  stage: test
  image: python:${PY_VERSION}-slim
  parallel:
    matrix:
      - PY_VERSION: ["3.10", "3.11", "3.12", "3.13"]
  cache:
    key: "pip-py${PY_VERSION}"
    paths:
      - .cache/pip
  script:
    - sh resources/ci_cd/test.sh

pages:
  stage: deploy
  script:
    - resources/ci_cd/pages.sh
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# GitLab-managed SAST. The template auto-detects the language, runs analyzer
# jobs in the `test` stage, and is advisory (allow_failure) by default. We do
include:
  - template: SAST.gitlab-ci.yml
