[bumpversion]
current_version = 2.2.2
commit = True
tag = True
tag_name = v{new_version}
message = chore(release): bump version {current_version} to {new_version}
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)
serialize = 
	{major}.{minor}.{patch}

[bumpversion:file:VERSION]

[bumpversion:file:./plot_misc/_version.py]
search = __version__ = '{current_version}'
replace = __version__ = '{new_version}'

[bumpversion:file:./pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:./docs/source/conf.py]
search = release = '{current_version}'
replace = release = '{new_version}'

[bumpversion:file:./README.md]
search = __version__: `{current_version}`
replace = __version__: `{new_version}`

[bumpversion:file:./CHANGELOG.md]
search = ## Unreleased
replace = ## {new_version}

[bumpversion:file:./resources/conda/build/meta.yaml]
search = set version = "{current_version}"
replace = set version = "{new_version}"
