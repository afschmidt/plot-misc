# yaml-jinja
{% set version = "2.0.4" %}

package:
  name: plot-misc
  version: {{ version }}

source:
  git_url: https://gitlab.com/SchmidtAF/plot-misc.git
  git_tag: v{{ version }}

build:
  noarch: python
  number: 0

requirements:
  host:
    - python >=3.10,<3.13
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python >=3.10,<3.13
    - numpy >=1.21
    - pandas >=1.3
    - matplotlib >=3.5
    - seaborn >=0.11
    - statsmodels >=0.12
    - scipy >=1.5
    - scikit-learn >=1.4
    - adjusttext >=1.3

test:
  source_files:
    - tests
  imports:
    - plot_misc
  commands:
    - pytest -v tests
  requires:
    - pytest
    - pytest-mock
    - pytest-dependency

about:
  home: "https://gitlab.com/SchmidtAF/plot-misc"
  authors:
    - name: "A Floriaan Schmidt"
      email: "amand.schmidt@ucl.ac.uk"
  summary: >
    A collection of Python-based plotting templates for medical, epidemiological,
    genetic, and machine learning visualisations.
  description: |
    plot-misc provides a suite of reusable plotting templates designed to
    streamline the creation of common visualisations in medical, epidemiological,
    genetic, and machine learning contexts. These templates facilitate consistent
    and efficient generation of plots, aiding researchers and analysts in
    presenting their data effectively.  These functions are intentionally minimal 
    and return axes and figure handles, allowing full post-hoc customisation using 
    standard matplotlib interfaces, resulting in presentation ready visuals.
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  dev_url: https://gitlab.com/SchmidtAF/plot-misc
  doc_url: https://schmidtaf.gitlab.io/plot-misc/

extra:
  recipe-maintainers:
    - SchmidtAF
