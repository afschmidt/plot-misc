package:
  name: plot_misc
  version: 1.1.2

source:
  git_url: https://gitlab.com/SchmidtAF/plot-misc.git
  git_tag: v1.1.2 

build:
  noarch: python
  number: 0

requirements:
  host:
    - python >=3.10,<3.13
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python >=3.10,<3.13
    - numpy >=1.21
    - pandas >=1.3
    - matplotlib >=3.5
    - seaborn >=0.11
    - statsmodels >=0.12
    - scipy >=1.5
    - scikit-learn >=1.4
    - adjusttext >=0.7

test:
  source_files:
    - tests
  imports:
    - plot_misc
  commands:
    - pytest -v tests
  requires:
    - pytest
    - pytest-mock
    - pytest-dependency

about:
  home: "https://gitlab.com/SchmidtAF/plot-misc"
  summary: "Various plotting templates built on top of matplotlib"
  license: GPLv3+
  license_file: LICENSE
  authors:
    - name: "A Floriaan Schmidt"
      email: "amand.schmidt@ucl.ac.uk"

extra:
  recipe-maintainers:
    - afschmidt
