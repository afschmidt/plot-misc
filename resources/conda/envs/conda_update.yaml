channels:
  - anaconda
  - conda-forge
  - bioconda
dependencies:
  # ### core packages
  - python>=3.10,<3.13
  - pandas>=1.3
  - numpy>=1.21
  - pytest=6.*
  - pytest-mock>=3.*
  - pytest-dependency>=0.5.*
  - scipy>=1.5.*
  - scikit-learn>=1.4.*
  - statsmodels>=0.12.*
  - seaborn>=0.11.*
  - matplotlib>=3.5.*
  - adjusttext>=1.3
  # other
  - jupyter
  - pip

  # ### Dev packages
  # sphinx documentation
  - sphinx_rtd_theme
  - sphinx_bootstrap_theme
  - furo
  - bump2version
  - myst-parser
  - nbsphinx
  - nbsphinx-link
  - numpydoc
  - codespell
  # other
  - bump2version=1.*
  # for conda
  - conda-build
  - anaconda-client
  - conda-verify
  # for pypi
  - python-build
  - twine 
  - setuptools
  - wheel
