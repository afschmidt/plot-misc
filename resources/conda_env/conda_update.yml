channels:
  - anaconda
  - conda-forge
  - bioconda
dependencies:
  # ### core packages
  - python>=3.12
  - pandas>=1.3
  - numpy>=1.21
  - pytest=6.*
  - pytest-mock>=3.*
  - pytest-dependency>=0.5.*
  - scipy>=1.5.*
  - scikit-learn>=1.4.*
  - statsmodels>=0.12.*
  - seaborn>=0.11.*
  - matplotlib>=3.5.*
  - adjusttext>=0.7
  # other
  - jupyter
  - pip

  # ### Dev packages
  # sphinx documentation
  - sphinx_rtd_theme
  - sphinx_bootstrap_theme
  - furo
  - bump2version
  - myst-parser
  - nbsphinx
  - nbsphinx-link
  - numpydoc
  # other
  - bump2version=1.*
  - python-build
